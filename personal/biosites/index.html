<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>vubio | BioSites</title>
    <link rel="icon" type="image/png" href="../../assets/images/vubio_favicon_small.png">

    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

    <style>
        /* --- Your Original Site Theme --- */
        :root {
            --bg: #0b132b;
            --bg-light: #1c2541;
            --accent: #6fffe9;
            --text: #e0f2ff;
            --muted: #6b7b8c;
            --glass: rgba(12, 19, 43, 0.75);
        }
        * { box-sizing: border-box; }
        body {
            font-family: "Bahnschrift", "Segoe UI", Roboto, Arial, sans-serif;
            margin: 0; padding: 0;
            color: var(--text);
            background: radial-gradient(circle at 20% 20%, rgba(111,255,233,0.08), transparent 30%),
                        linear-gradient(145deg, var(--bg) 0%, var(--bg-light) 60%, var(--bg) 100%);
            background-attachment: fixed;
            min-height: 100vh;
        }
        nav {
            background: var(--glass);
            backdrop-filter: blur(10px);
            padding: 1.5rem; text-align: center;
            border-bottom: 1px solid rgba(111,255,233,0.1);
        }
        nav a {
            color: var(--text);
            margin: 0 15px; text-decoration: none;
            font-weight: 400; font-size: 0.95rem;
            text-transform: lowercase; letter-spacing: 0.05em;
            transition: color 0.3s;
        }
        nav a:hover { color: var(--accent); }
        .container {
            max-width: 900px; margin: 50px auto; padding: 0 20px;
        }
        section {
            background: var(--glass);
            padding: 40px; border-radius: 12px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        h1, h2 { color: var(--accent); text-transform: lowercase; margin-top: 0; }
        footer {
            text-align: center; padding: 20px;
            color: var(--muted); font-size: 0.8rem;
            text-transform: lowercase;
        }

        /* --- Bio Sites Layout --- */
        #loading-message {
            color: var(--accent);
            font-style: italic;
            margin-bottom: 20px;
        }
        .class-box {
            margin-top: 25px;
            padding: 20px;
            border-radius: 10px;
            background: rgba(12, 19, 43, 0.55);
            border: 1px solid rgba(255,255,255,0.05);
            animation: fadeIn 0.4s ease-in-out;
        }
        .link-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 12px;
        }
        .link-btn {
            display: inline-block;
            background: transparent;
            color: var(--text);
            border: 1px solid var(--muted);
            padding: 8px 14px;
            border-radius: 6px;
            text-decoration: none;
            font-family: inherit;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }
        .link-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <nav>
        <a href="/">trang chủ</a>
        <a href="/personal/">cá nhân</a>
        <a href="https://youtube.com/@vubio" target="_blank">youtube</a>
    </nav>

    <div class="container">
        <section>
            <h1>BioSites</h1>

            <div id="loading-message">Loading Excel file...</div>

            <div id="classes-container"></div>

        </section>
    </div>

    <footer>
        &copy; 2026 vubio
    </footer>

    <script>
        // The filename of your Excel file
        const excelFileUrl = "BioSites.xlsx";

        async function loadBioSites() {
            try {
                // 1. Fetch the Excel file from the server
                const response = await fetch(excelFileUrl);
                if (!response.ok) throw new Error("Could not find the Excel file.");

                const arrayBuffer = await response.arrayBuffer();

                // 2. Parse the data using SheetJS
                const workbook = XLSX.read(arrayBuffer, { type: "array" });
                const sheetName = workbook.SheetNames[0];

                if (!workbook.Sheets[sheetName]) {
                    throw new Error(`Sheet named "${sheetName}" not found in the Excel file.`);
                }

                // 3. Convert sheet to JSON array
                const data = XLSX.utils.sheet_to_json(workbook.Sheets[sheetName]);

                // 4. Process the data
                buildSiteSections(data);

            } catch (error) {
                document.getElementById('loading-message').innerText = "Error loading data: " + error.message;
                console.error(error);
            }
        }

        function buildSiteSections(data) {
            const classesContainer = document.getElementById('classes-container');
            document.getElementById('loading-message').style.display = 'none';

            // Group data by "Class"
            const groups = {};
            data.forEach(row => {
                const className = row.Class;
                const label = row.Label;
                const link = row.Link;

                if (!className || !label || !link) return;

                if (!groups[className]) {
                    groups[className] = [];
                }
                groups[className].push({ label, link });
            });

            // Create a box for each class
            Object.keys(groups).forEach(className => {
                const box = document.createElement('div');
                box.className = 'class-box';

                const title = document.createElement('h2');
                title.innerText = className;
                box.appendChild(title);

                const grid = document.createElement('div');
                grid.className = 'link-grid';

                groups[className].forEach(item => {
                    const a = document.createElement('a');
                    a.className = 'link-btn';
                    a.innerText = item.label;
                    a.href = item.link;
                    a.target = '_blank';
                    a.rel = 'noopener noreferrer';
                    grid.appendChild(a);
                });

                box.appendChild(grid);
                classesContainer.appendChild(box);
            });
        }

        // Run the function when the page loads
        window.onload = loadBioSites;
    </script>
</body>
</html>
