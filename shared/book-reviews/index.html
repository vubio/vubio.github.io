<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sách</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
    <style>
        body {
            font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
            line-height: 1.6;
            color: #1a1a1a;
            max-width: 900px;
            margin: 20px auto;
            padding: 20px;
        }

        .header-section {
            border-bottom: 2px solid #000;
            padding-bottom: 20px;
            margin-bottom: 30px;
        }

        .copyright-tag {
            display: inline-block;
            background: #000;
            color: #fff;
            padding: 2px 8px;
            font-size: 11px;
            font-weight: bold;
            text-transform: uppercase;
        }

        .meta-info { font-size: 13px; color: #666; margin-top: 10px; }

        details {
            border: 2px solid #000;
            border-radius: 4px;
            margin-bottom: 15px;
            background: #fff;
        }

        summary {
            padding: 15px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            list-style: none;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #f4f4f4;
        }

        summary:hover { background: #e0e0e0; }

        summary::after {
            content: '+';
            font-size: 20px;
        }

        details[open] summary::after {
            content: '−';
        }

        .book-content {
            padding: 20px;
            border-top: 1px solid #ddd;
            background: #fff;
        }
        
        .footer { margin-top: 50px; text-align: center; font-size: 13px; color: #0056b3; }
    </style>
</head>
<body>

    <div class="header-section">
        <div class="copyright-tag">© 2026 vubio</div>
        <h1>Sách</h1>
        <p>Nơi mình lưu lại ghi chú về một số cuốn sách hay mình đã đọc</p>
        
        <div class="meta-info">
            <strong>Liên hệ:</strong> vubio.contact@gmail.com<br>
            <strong>Cập nhật mới nhất:</strong> <span id="last-modified">Đang tải...</span>
        </div>
    </div>

    <div id="book-container">Loading...</div>

    <script>
        async function getLastModifiedDate() {
            try {
                const response = await fetch('https://raw.githubusercontent.com/vubio/vubio.github.io/main/shared/book-reviews/data.docx', 
                    { method: 'HEAD' }
                );
                const lastModified = response.headers.get('Last-Modified');
                if (lastModified) {
                    const date = new Date(lastModified);
                    const formattedDate = date.toLocaleDateString('vi-VN', {
                        year: 'numeric',
                        month: '2-digit',
                        day: '2-digit'
                    }).replace(/\//g, '/');
                    document.getElementById('last-modified').textContent = formattedDate;
                }
            } catch (error) {
                console.error('Error fetching file metadata:', error);
                document.getElementById('last-modified').textContent = 'Không xác định';
            }
        }

        async function loadBooks() {
            try {
                // 1. Tải file data.docx dưới dạng ArrayBuffer
                const response = await fetch('data.docx');
                const arrayBuffer = await response.arrayBuffer();

                // 2. Cấu hình Mammoth: Map style "Title" trong Word thành thẻ h1 đặc biệt
                const options = {
                    styleMap: [
                        "p[style-name='Title'] => h1.book-title:fresh",
                        "p[style-name='Titles'] => h1.book-title:fresh"
                    ]
                };

                // 3. Chuyển đổi .docx sang HTML
                const result = await mammoth.convertToHtml({arrayBuffer: arrayBuffer}, options);
                const tempDiv = document.createElement('div');
                tempDiv.innerHTML = result.value;

                const container = document.getElementById('book-container');
                container.innerHTML = ''; 

                let currentDetails = null;
                let currentContent = null;

                // 4. Duyệt qua các phần tử để tạo accordion dựa trên thẻ h1.book-title
                Array.from(tempDiv.children).forEach(el => {
                    const isBookTitle = el.tagName === 'H1' && el.classList.contains('book-title');

                    if (isBookTitle) {
                        currentDetails = document.createElement('details');
                        const summary = document.createElement('summary');
                        summary.textContent = el.textContent;
                        
                        currentContent = document.createElement('div');
                        currentContent.className = 'book-content';

                        currentDetails.appendChild(summary);
                        currentDetails.appendChild(currentContent);
                        container.appendChild(currentDetails);
                    } else if (currentContent) {
                        // Các nội dung khác (Heading 1, Heading 2, Text...) sẽ nằm trong toggle
                        currentContent.appendChild(el.cloneNode(true));
                    }
                });

            } catch (error) {
                document.getElementById('book-container').innerHTML = "Error: file not found or could not be parsed";
                console.error(error);
            }
        }

        // Load both the book content and the last modified date
        loadBooks();
        getLastModifiedDate();
    </script>
</body>
</html>
